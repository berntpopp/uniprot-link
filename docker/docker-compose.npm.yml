# Nginx Proxy Manager deployment overlay for uniprot-link.
#
# Self-contained (used standalone, not layered on docker-compose.yml): one
# unified container serves the FastAPI REST API on / and the MCP streamable-HTTP
# transport on /mcp via a single port (8000). NPM reverse-proxies to the fixed
# container_name on the shared external npm_default network. Mirrors the
# gtex-link / clingen-link fleet pattern. Stateless (live UniProt SPARQL
# passthrough) - no data volume needed.
#
#   docker compose -f docker/docker-compose.npm.yml --env-file .env.docker up -d --build
name: uniprot-link-npm

services:
  uniprot_link:
    # Deploy pulls the released, attested image; it never builds from source.
    # Pin a digest, not a tag: there is no `latest`, and only a digest is immutable.
    image: ${UNIPROT_LINK_IMAGE:?Set UNIPROT_LINK_IMAGE to ghcr.io/berntpopp/uniprot-link@sha256:<digest>}
    pull_policy: missing
    container_name: uniprot-link-npm
    # NO published host ports - NPM handles all routing via the container name.
    expose:
      - "8000"
    environment:
      - UNIPROT_LINK_TRANSPORT=unified
      - UNIPROT_LINK_HOST=0.0.0.0
      - UNIPROT_LINK_PORT=8000
      - UNIPROT_LINK_MCP_PATH=/mcp
      - 'UNIPROT_LINK_ALLOWED_HOSTS=["localhost","127.0.0.1","::1","uniprot-link.genefoundry.org"]'
      - 'UNIPROT_LINK_ALLOWED_ORIGINS=["https://uniprot-link.genefoundry.org"]'
      - 'UNIPROT_LINK_CORS_ORIGINS=["https://uniprot-link.genefoundry.org"]'
      - UNIPROT_LINK_LOG_LEVEL=${LOG_LEVEL_API:-INFO}
      - UNIPROT_LINK_LOG_FORMAT=json
      # UniProt etiquette: a real contact mailbox goes in the SPARQL User-Agent.
      - UNIPROT_LINK_SPARQL__CONTACT_EMAIL=${UNIPROT_LINK_SPARQL__CONTACT_EMAIL:-bernt.popp@charite.de}
    # Image CMD already runs `uniprot-link serve --transport unified ...`.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    networks:
      - uniprot_link_internal_net
      - npm_proxy_network
    deploy:
      resources:
        limits:
          memory: ${UNIPROT_API_MEMORY_LIMIT:-512m}
          cpus: ${UNIPROT_API_CPU_LIMIT:-0.5}
          pids: 256
        reservations:
          memory: 128m
          cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=uniprot-link,environment=production,proxy=npm"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

networks:
  uniprot_link_internal_net:
    driver: bridge
    name: uniprot_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}

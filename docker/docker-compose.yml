# Explicit project name isolates this stack. Without it, Compose defaults the project to the
# parent-dir basename ("docker"), shared by every -link repo that roots its compose at
# docker/docker-compose.yml — pooling unrelated containers/volumes into one "docker" project
# and triggering spurious orphan-container warnings (and making --remove-orphans able to delete
# a sibling stack). See https://docs.docker.com/reference/compose-file/version-and-name/
name: uniprot-link

services:
  uniprot-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: uniprot-link:latest
    # Dev/local only — loopback-bound (host_ip: 127.0.0.1) so copying this file
    # to a server never publishes the unauthenticated backend on the public IP
    # (Docker otherwise binds 0.0.0.0 and bypasses the host firewall). This is the
    # Compose long-syntax equivalent of the short-form "127.0.0.1:HOST:CONTAINER".
    # Production fronts the container with a reverse proxy via the prod/npm
    # overlays (ports: !reset []). Backends are unauthenticated by design.
    # Pin the host port by setting UNIPROT_LINK_HOST_PORT; discover it with:
    # make docker-url
    ports:
      - target: 8000
        published: "${UNIPROT_LINK_HOST_PORT:-8013}"
        host_ip: 127.0.0.1
        protocol: tcp
    environment:
      UNIPROT_LINK_TRANSPORT: unified
      UNIPROT_LINK_HOST: 0.0.0.0
      UNIPROT_LINK_PORT: "8000"
      UNIPROT_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      UNIPROT_LINK_ALLOWED_ORIGINS: '[]'
      UNIPROT_LINK_LOG_LEVEL: INFO
      UNIPROT_LINK_LOG_FORMAT: json
      # Set a real contact mailbox per UniProt etiquette:
      UNIPROT_LINK_SPARQL__CONTACT_EMAIL: bernt.popp@charite.de
      # Build provenance surfaced in /health and get_server_capabilities().build.
      # Pass at up-time: UNIPROT_LINK_GIT_SHA=$(git rev-parse --short HEAD) ...
      UNIPROT_LINK_GIT_SHA: ${UNIPROT_LINK_GIT_SHA:-unknown}
      UNIPROT_LINK_BUILT_AT: ${UNIPROT_LINK_BUILT_AT:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: localhost", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

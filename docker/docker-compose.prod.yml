# Production docker-compose override (Container & Deployment Hardening Standard v1).
# Layered on the base file:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# uniprot-link is stateless (live UniProt SPARQL passthrough) — no data volume.
# Front the container with a reverse proxy (TLS at the edge); see
# docker-compose.npm.yml for the Nginx Proxy Manager expose-only overlay.

services:
  uniprot-link:
    build: !reset null
    image: "${UNIPROT_LINK_IMAGE:?Set UNIPROT_LINK_IMAGE to ghcr.io/berntpopp/uniprot-link@sha256:<digest>}"
    pull_policy: missing

    environment:
      GF_HEALTHCHECK_HOST: localhost
      UNIPROT_LINK_TRANSPORT: unified
      UNIPROT_LINK_LOG_LEVEL: INFO
      UNIPROT_LINK_LOG_FORMAT: json
      UNIPROT_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","uniprot-link.genefoundry.org"]'
      UNIPROT_LINK_ALLOWED_ORIGINS: '["https://uniprot-link.genefoundry.org"]'
      UNIPROT_LINK_CORS_ORIGINS: '["https://uniprot-link.genefoundry.org"]'

    # No published host ports in production; reach the container via the proxy only.
    # !reset (not []) is required: Compose MERGES list fields across -f overlays,
    # so a plain `ports: []` would NOT drop the base file's host mapping.
    ports: !reset []
    expose:
      - "8000"

    # Read-only root filesystem; the only writable path is an ephemeral tmpfs
    # (stateless service — nothing persists across restarts).
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    init: true
    restart: on-failure

    deploy: !override
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 256

    # Default header remains "Host: localhost"; GF_HEALTHCHECK_HOST lets CI
    # render the exact central healthcheck command without changing that value.
    healthcheck:
      test:
        ["CMD", "sh", "-c", "curl -f -H \"Host: $${GF_HEALTHCHECK_HOST}\" http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=uniprot-link,environment=production"
